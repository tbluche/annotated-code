
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Annotated Code Viewer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  </head>
  <body>
    <div class="container-fluid vh-100 d-flex flex-column p-3">
      <div class="d-flex align-items-center mb-2">
        <h4 class="me-3 mb-0">Annotated Code Viewer</h4>
        <div class="ms-auto btn-group" role="group">
          <button id="prevBtn" class="btn btn-outline-primary btn-sm">←</button>
          <button id="nextBtn" class="btn btn-outline-primary btn-sm">→</button>
        </div>
        <div id="annotationCounter" class="ms-3 small" style="width:120px;text-align:right">0 / 0</div>
      </div>

      <div class="row g-3 flex-grow-1 overflow-hidden">
        <div class="col-7 h-100">
          <div id="codeContainer" class="code-panel h-100 overflow-auto">
            <pre id="code" class="mb-0"><code></code></pre>
          </div>
        </div>
        <div class="col-5 h-100">
          <div id="annotations" class="annotations-panel h-100 overflow-auto p-3">
            <div id="annotationText" class="annotation-text"></div>
          </div>
        </div>
      </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.1/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
