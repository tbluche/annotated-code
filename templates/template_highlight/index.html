<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Highlight Creator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
  </head>
  <body>
    <div class="container-fluid vh-100 d-flex flex-column p-3">
      <div class="d-flex align-items-center mb-2">
        <h4 class="me-3 mb-0">Highlight Creator</h4>
        <div class="ms-auto d-flex align-items-center">
          <div id="presets" class="d-flex gap-2 me-3"></div>
          <div class="small text-muted me-2">Active:</div>
          <div id="activePreset" class="preset-active me-3"></div>
        </div>
      </div>

      <div class="row g-3 flex-grow-1 overflow-hidden">
        <div class="col-8 h-100">
          <div id="codeContainer" class="code-panel h-100 overflow-auto">
            <pre id="code"><code>__CODE_HTML__</code></pre>
          </div>
        </div>
        <div class="col-4 h-100">
          <div class="annotations-panel h-100 overflow-auto p-3 d-flex flex-column">
            <div class="mb-2">
              <button id="addHighlightBtn" class="btn btn-primary btn-sm me-2">Add Highlight</button>
              <button id="clearSelectionBtn" class="btn btn-outline-secondary btn-sm">Clear Selection</button>
            </div>

            <div class="mb-2">
              <div class="d-flex justify-content-between align-items-center mb-1">
                <strong>Highlights</strong>
                <button id="copyBtn" class="btn btn-success btn-sm">Copy highlights</button>
              </div>
              <div id="highlightsList" class="mb-2"></div>
            </div>

            <div class="mt-auto">
              <div class="mb-1 small text-muted">Generated strings (one per highlight)</div>
              <textarea id="generated" class="form-control monospace" rows="6" readonly></textarea>
            </div>
          </div>
        </div>
      </div>

    <script src="app.js"></script>
  </body>
</html>
